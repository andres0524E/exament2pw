<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="format-detection" content="telephone=no">
    
    <title>Examen Tema 2: HTML, XML y CSS</title>
    <link rel="icon" type="image/png" href="assets/img/favicon.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <nav class="navbar glass-nav p-3">
        <div class="container-fluid">
            <span class="navbar-brand text-white fs-6 fw-semibold opacity-75">
                Credit Card
            </span>
        </div>
    </nav>

    <main class="container d-flex flex-column justify-content-center align-items-center flex-grow-1 my-5">
        <div class="row glass-container w-100 mx-auto">
            
            <div class="col-md-6 d-flex justify-content-center align-items-center mb-5 mb-md-0">
                <div class="card-wrapper w-100 d-flex justify-content-center">
                    <div id="card-inner" class="credit-card-preview w-100">
                        
                        <div class="card-front">
                            <div class="d-flex justify-content-between align-items-start mb-4">
                                <div class="chip"></div>
                                <div class="visa-logo">VISA</div>
                            </div>
                            
                            <div id="display-number" class="text-white mb-4 tracking-widest fw-medium card-number-text">4123 5678 9101 1121</div>
                            
                            <div class="d-flex justify-content-between text-white w-100">
                                <div class="d-flex flex-column" style="width: 70%; overflow: hidden;">
                                    <small class="d-block text-uppercase opacity-75 card-small-text mb-1">titular de la tarjeta</small>
                                    <span id="display-name" class="text-uppercase fw-medium card-medium-text text-truncate d-block w-100">Andres Jeriel Cruz Resendiz</span>
                                </div>
                                <div class="d-flex flex-column text-end" style="width: 25%;">
                                    <small class="d-block text-uppercase opacity-75 card-small-text mb-1">expira</small>
                                    <span id="display-expiry" class="fw-medium card-medium-text">--/--</span>
                                </div>
                            </div>
                        </div>

                        <div class="card-back">
                            <div class="magnetic-stripe"></div>
                            <div class="px-4 mt-4">
                                <small class="text-white-50 text-uppercase d-block mb-1 card-small-text text-end">código cvv</small>
                                <div id="display-cvv" class="bg-white text-dark text-end pe-3 py-2 rounded fw-bold fs-6">***</div>
                            </div>
                        </div>

                    </div>
                </div>
            </div>

            <div class="col-md-6 px-md-4">
                <h4 class="text-white mb-4 fw-semibold">Detalles de Pago</h4>
                <form id="payment-form">
                    <div class="mb-3">
                        <label class="form-label text-white-50 small">Número de tarjeta</label>
                        <input type="text" id="input-number" class="form-control glass-input" placeholder="4123 5678 9101 1121" maxlength="19">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-white-50 small">Titular de la tarjeta</label>
                        <input type="text" id="input-name" class="form-control glass-input" placeholder="Andres Jeriel Cruz Resendiz">
                    </div>
                    <div class="row mb-4">
                        <div class="col-7">
                            <label class="form-label text-white-50 small">Fecha de expiración</label>
                            <div class="d-flex gap-2">
                                <select id="input-month" class="form-select glass-input">
                                    <option value="01">01</option>
                                    <option value="02">02</option>
                                    <option value="03">03</option>
                                    <option value="04">04</option>
                                    <option value="05">05</option>
                                    <option value="06">06</option>
                                    <option value="07">07</option>
                                    <option value="08">08</option>
                                    <option value="09">09</option>
                                    <option value="10">10</option>
                                    <option value="11">11</option>
                                    <option value="12">12</option>
                                </select>
                                <select id="input-year" class="form-select glass-input">
                                    <option value="26">2026</option>
                                    <option value="27">2027</option>
                                    <option value="28">2028</option>
                                    <option value="29">2029</option>
                                    <option value="30">2030</option>
                                    <option value="31">2031</option>
                                    <option value="32">2032</option>
                                    <option value="33">2033</option>
                                    <option value="34">2034</option>
                                    <option value="35">2035</option>
                                    <option value="36">2036</option>
                                </select>
                            </div>
                        </div>
                        <div class="col-5">
                            <label class="form-label text-white-50 small">Código (CVV)</label>
                            <input type="text" id="input-cvv" class="form-control glass-input" placeholder="123" maxlength="4">
                        </div>
                    </div>
                    <button type="button" id="btn-pay" class="btn btn-glass w-100 py-3 fw-medium mt-2">Pagar ahora</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="glass-nav p-3 text-center text-white-50 mt-auto">
        <small>Desarrollado por: Andres Jeriel Cruz Resendiz | Prog web</small>
    </footer>

    <div id="success-modal" class="modal-overlay">
        <div class="glass-modal">
            <button id="close-modal" class="close-btn">&times;</button>
            <div class="success-icon">✓</div>
            <h5 class="text-white fw-semibold mb-2">¡Pago exitoso!</h5>
            <p class="text-white-50 small m-0">Tu pago ha sido generado con éxito.</p>
        </div>
    </div>

    <script src="assets/js/script.js"></script>
</body>
</html>
